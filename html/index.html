<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">

        <title>Eatly | Home</title>
        <link rel="stylesheet" href="../styles/main.css">
        <script src="../scripts/main.js" type="module" defer></script>
    </head>
    <body>
        <header class="header" data-js-header>
            <div class="header__inner full-width-line-wn-paddings container">
                <a
                        href="#"
                        class="header__logo logo"
                >
                    <img
                            class="logo__image"
                            src="../icons/Logo.svg"
                            alt=""
                            width="111"
                            height="42"
                    >
                </a>
                <nav class="header__menu">
                    <ul class="header__menu-list">
                        <li class="header__menu-list-item">
                            <a href="#" class="header__menu-link base-link">Menu</a>
                        </li>
                        <li class="header__menu-list-item">
                            <a href="#" class="header__menu-link base-link">Blog</a>
                        </li>
                        <li class="header__menu-list-item">
                            <a href="#" class="header__menu-link base-link">Pricing</a>
                        </li>
                        <li class="header__menu-list-item">
                            <a href="#" class="header__menu-link base-link">Contact</a>
                        </li>
                    </ul>
                    <div class="header__links hidden-mobile">
                        <a href="#" class="header__links-link button">Login</a>
                        <a href="#" class="header__links-link button button--accent">Sign up</a>
                    </div>
                </nav>
                <div class="header__burger-open-button burger-open-button visible-mobile"
                    data-js-open-header-burger-menu-button
                >
                    <svg width="22" height="27" viewBox="0 0 22 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 11C13.7614 11 16 8.76142 16 6C16 3.23858 13.7614 1 11 1C8.23858 1 6 3.23858 6 6C6 8.76142 8.23858 11 11 11Z" stroke="currentColor" stroke-width="1.875"/>
                        <path d="M21 20.375C21 23.4812 21 26 11 26C1 26 1 23.4812 1 20.375C1 17.2688 5.4775 14.75 11 14.75C16.5225 14.75 21 17.2688 21 20.375Z" stroke="currentColor" stroke-width="1.875"/>
                    </svg>
                </div>
            </div>
        </header>

    <div class="header__overlay" data-js-header-overlay>
        <div class="header__links">
            <a href="#" class="header__links-link button">Login</a>
            <a href="#" class="header__links-link button button--accent">Sign up</a>
        </div>
        <div class="header__burger-close-button burger-close-button"
            data-js-close-header-burger-menu-button
        >
            <span class="burger-close-button__line"></span>
            <span class="burger-close-button__line"></span>
        </div>
    </div>

    </body>
</html>
